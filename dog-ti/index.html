<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DogTI - 狗狗性格测试</title>
    <style>
        :root {
            --bg: #f3f3f1;
            --card: #ffffff;
            --text: #0f0f0f;
            --muted: #9c9c9c;
            --line: #dbdbdb;
            --yellow: #f0db67;
            --black: #050505;
            --shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 18px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: radial-gradient(circle at top, #fafaf8 0%, var(--bg) 42%, #ececea 100%);
            color: var(--text);
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            padding: 20px 14px 40px;
        }

        button {
            font: inherit;
        }

        .app {
            width: min(100%, 430px);
            min-height: calc(100dvh - 40px);
            position: relative;
        }

        .screen {
            display: none;
            animation: fadeIn 0.28s ease;
        }

        .screen.active {
            display: block;
        }

        .screen.quiz-screen.active {
            display: flex;
        }

        .quiz-screen {
            min-height: calc(100dvh - 40px);
            display: flex;
            flex-direction: column;
        }

        .quiz-main {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .quiz-footer {
            position: sticky;
            bottom: 0;
            margin-top: auto;
            padding: 14px 0 calc(env(safe-area-inset-bottom, 0px) + 4px);
            background: linear-gradient(180deg, rgba(243, 243, 241, 0) 0%, rgba(243, 243, 241, 0.92) 20%, rgba(243, 243, 241, 0.98) 100%);
            backdrop-filter: blur(6px);
        }

        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            display: inline-flex;
            gap: 8px;
            letter-spacing: 2px;
            font-family: "Courier New", monospace;
            font-size: clamp(42px, 12vw, 64px);
            font-weight: 900;
            line-height: 1;
            margin: 10px 0 22px;
            perspective: 800px;
        }

        .logo span {
            display: inline-block;
            background: #111;
            color: #fff;
            padding: 8px 6px 4px;
            box-shadow: 8px 8px 0 #000;
            min-width: 0.95em;
            text-align: center;
            transform-origin: center bottom;
            animation: logoBounce 3.6s cubic-bezier(0.35, 0, 0.2, 1) infinite;
            will-change: transform;
        }

        .logo span:nth-child(2) {
            animation-delay: 0.12s;
        }

        .logo span:nth-child(3) {
            animation-delay: 0.24s;
        }

        .logo span:nth-child(4) {
            animation-delay: 0.36s;
        }

        .logo span:nth-child(5) {
            animation-delay: 0.48s;
        }

        .hero {
            text-align: center;
            padding-top: 6px;
        }

        .sprite-wall {
            position: relative;
            overflow: hidden;
            margin: 12px 0 32px;
            padding: 10px 0;
        }

        .sprite-wall::before,
        .sprite-wall::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            width: 26px;
            z-index: 3;
            pointer-events: none;
        }

        .sprite-wall::before {
            left: 0;
            background: linear-gradient(90deg, var(--bg) 0%, rgba(243, 243, 241, 0) 100%);
        }

        .sprite-wall::after {
            right: 0;
            background: linear-gradient(270deg, var(--bg) 0%, rgba(243, 243, 241, 0) 100%);
        }

        .sprite-marquee {
            display: flex;
            gap: 14px;
            width: max-content;
            margin-bottom: 16px;
            animation: driftLeft 24s cubic-bezier(0.45, 0, 0.2, 1) infinite;
            will-change: transform;
        }

        .sprite-marquee.reverse {
            animation-name: driftRight;
            animation-duration: 26s;
        }

        .sprite-marquee:last-child {
            margin-bottom: 0;
        }

        .sprite {
            --stack-y: 0px;
            --tilt: 0deg;
            --tilt-alt: 0.4deg;
            flex: 0 0 96px;
            position: relative;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(248, 248, 248, 0.94) 100%);
            border: 2px solid #111;
            border-radius: 24px;
            padding: 10px 8px 11px;
            box-shadow: 0 16px 24px rgba(0, 0, 0, 0.08), 0 8px 0 rgba(0, 0, 0, 0.12);
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            animation: cardBob 4s ease-in-out infinite;
            will-change: transform;
        }

        .sprite::before {
            content: "";
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: -13px;
            height: 18px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.12);
            filter: blur(10px);
            opacity: 0.55;
            z-index: -1;
        }

        .sprite:nth-child(4n + 1) {
            --stack-y: -4px;
            --tilt: -1.3deg;
            --tilt-alt: 0.2deg;
        }

        .sprite:nth-child(4n + 2) {
            --stack-y: 3px;
            --tilt: 1deg;
            --tilt-alt: -0.35deg;
        }

        .sprite:nth-child(4n + 3) {
            --stack-y: -2px;
            --tilt: -0.7deg;
            --tilt-alt: 0.45deg;
        }

        .sprite:nth-child(4n + 4) {
            --stack-y: 4px;
            --tilt: 1.2deg;
            --tilt-alt: -0.25deg;
        }

        .sprite:nth-child(2n) {
            animation-delay: 0.28s;
        }

        .sprite:nth-child(3n) {
            animation-delay: 0.62s;
        }

        .sprite-photo {
            width: 64px;
            height: 58px;
            border-radius: 18px;
            padding: 5px;
            background: radial-gradient(circle at 50% 22%, var(--cat-bg-1, #ffffff) 0%, var(--cat-bg-2, #ece8df) 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8), inset 0 -8px 14px rgba(0, 0, 0, 0.03);
        }

        .sprite-photo svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .sprite-name {
            font-size: 11px;
            color: #7d7d7d;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        @keyframes logoBounce {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            10% {
                transform: translateY(0) rotate(0deg);
            }
            22% {
                transform: translateY(-6px) rotate(-0.8deg);
            }
            30% {
                transform: translateY(-2px) rotate(0.3deg);
            }
            38% {
                transform: translateY(-7px) rotate(0.8deg);
            }
            48% {
                transform: translateY(0) rotate(0deg);
            }
        }

        @keyframes driftLeft {
            0%,
            12% {
                transform: translateX(0);
            }
            24%,
            36% {
                transform: translateX(-7%);
            }
            48%,
            60% {
                transform: translateX(-14%);
            }
            72%,
            84% {
                transform: translateX(-21%);
            }
            100% {
                transform: translateX(-28%);
            }
        }

        @keyframes driftRight {
            0%,
            12% {
                transform: translateX(-28%);
            }
            24%,
            36% {
                transform: translateX(-21%);
            }
            48%,
            60% {
                transform: translateX(-14%);
            }
            72%,
            84% {
                transform: translateX(-7%);
            }
            100% {
                transform: translateX(0);
            }
        }

        @keyframes cardBob {
            0%,
            100% {
                transform: translateY(var(--stack-y)) rotate(var(--tilt)) scale(1);
            }
            30% {
                transform: translateY(calc(var(--stack-y) - 4px)) rotate(var(--tilt-alt)) scale(1.015);
            }
            54% {
                transform: translateY(calc(var(--stack-y) - 1px)) rotate(var(--tilt)) scale(1.005);
            }
        }



        .hero-title {
            margin: 0 auto 12px;
            font-size: clamp(28px, 7vw, 40px);
            line-height: 1.18;
            font-weight: 900;
            max-width: 10.5em;
        }

        .highlight {
            background: linear-gradient(transparent 58%, var(--yellow) 58%, var(--yellow) 88%, transparent 88%);
            padding: 0 4px;
        }

        .hero-subtitle {
            margin: 0 auto 18px;
            max-width: 16em;
            color: #9ea3ad;
            font-size: 18px;
            font-style: italic;
            line-height: 1.6;
            font-weight: 700;
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .hero-chip {
            border-radius: 999px;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.85);
            border: 1.5px solid var(--line);
            color: #666;
            font-size: 13px;
            font-weight: 700;
        }

        .primary-btn,
        .secondary-btn,
        .ghost-btn {
            width: 100%;
            border: 0;
            border-radius: 999px;
            min-height: 66px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
        }

        .primary-btn {
            background: var(--black);
            color: #fff;
            box-shadow: var(--shadow);
            font-size: 18px;
        }

        .primary-btn:hover,
        .secondary-btn:hover,
        .ghost-btn:hover,
        .icon-btn:hover,
        .option:hover {
            transform: translateY(-1px);
        }

        .primary-btn:disabled {
            cursor: not-allowed;
            background: #cacaca;
            box-shadow: none;
            transform: none;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid currentColor;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .bottom-note {
            margin-top: 22px;
            color: #99a0aa;
            text-align: center;
            font-size: 13px;
            line-height: 1.7;
        }

        .bottom-note a {
            color: #4890ff;
            text-decoration: none;
            font-weight: 800;
        }

        .bottom-note a:hover {
            text-decoration: underline;
        }


        .topbar {
            display: grid;
            grid-template-columns: 52px 1fr 52px;
            align-items: center;
            gap: 10px;
            padding-top: 6px;
        }

        .icon-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 0;
            background: rgba(255, 255, 255, 0.8);
            color: #191919;
            font-size: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            cursor: pointer;
        }

        .progress-count {
            text-align: center;
            color: #b0a690;
            font-size: 18px;
            font-weight: 800;
        }

        .progress-track {
            height: 6px;
            border-radius: 999px;
            background: #dfdfdf;
            overflow: hidden;
            margin: 22px 0 24px;
        }

        .progress-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #111 0%, #3e3e3e 100%);
            border-radius: inherit;
            transition: width 0.22s ease;
        }

        .prompt-row {
            display: grid;
            grid-template-columns: 84px 1fr;
            gap: 14px;
            align-items: center;
            margin-bottom: 24px;
        }

        .prompt-avatar {
            width: 84px;
            height: 84px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.9);
            display: grid;
            place-items: center;
            border: 1.5px solid #ececec;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.04);
            font-size: 40px;
        }

        .prompt-bubble {
            min-height: 84px;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 22px;
            border: 1.5px solid #ebebeb;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
        }

        .prompt-category {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #6d6d6d;
            font-size: 14px;
            font-weight: 800;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--yellow);
            box-shadow: 0 0 0 4px rgba(240, 219, 103, 0.2);
        }

        .prompt-hint {
            color: #b3b3b3;
            font-size: 13px;
            line-height: 1.5;
        }

        .question-title {
            margin: 0 0 22px;
            font-size: clamp(28px, 8vw, 44px);
            line-height: 1.28;
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        .options {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 0;
            overflow-y: auto;
            padding: 2px 2px 8px;
            scrollbar-width: thin;
        }


        .option {
            width: 100%;
            display: grid;
            grid-template-columns: 44px 1fr;
            gap: 14px;
            align-items: start;
            text-align: left;
            padding: 22px 22px 22px 18px;
            border-radius: 24px;
            border: 2px solid #dddddd;
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .option.active {
            background: #080808;
            color: #fff;
            border-color: #080808;
            box-shadow: var(--shadow);
        }

        .option-key {
            font-size: 28px;
            font-weight: 900;
            line-height: 1;
            color: #9ea3ad;
        }

        .option.active .option-key {
            color: #d9c27a;
        }

        .option-text {
            font-size: 18px;
            line-height: 1.7;
            font-weight: 800;
        }

        .result-screen {
            padding-bottom: 24px;
        }

        .result-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.9);
            border: 1.5px solid #e8e8e8;
            font-size: 13px;
            font-weight: 800;
            color: #5f5f5f;
        }

        .result-head {
            margin: 16px 0 18px;
        }

        .result-code {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 0.3em;
            color: #8c8060;
            margin-bottom: 10px;
        }

        .result-breed {
            margin: 0;
            font-size: clamp(34px, 9vw, 50px);
            line-height: 1.12;
            font-weight: 900;
        }

        .result-role {
            margin: 10px 0 0;
            font-size: 18px;
            color: #6b6b6b;
            font-weight: 700;
        }

        .result-hero {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.82) 100%);
            border: 1.5px solid #ececec;
            border-radius: 28px;
            padding: 20px 20px 22px;
            box-shadow: var(--shadow);
        }

        .result-emoji {
            font-size: 72px;
            line-height: 1;
            margin-bottom: 10px;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 14px 0 16px;
        }

        .tag {
            padding: 8px 12px;
            border-radius: 999px;
            background: #f4f4f4;
            color: #555;
            font-size: 13px;
            font-weight: 800;
        }

        .result-summary {
            margin: 0;
            font-size: 16px;
            line-height: 1.9;
            color: #353535;
            font-weight: 600;
        }

        .panel-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-top: 16px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            border: 1.5px solid #ebebeb;
            padding: 18px 18px 20px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.04);
        }

        .panel-title {
            margin: 0 0 14px;
            font-size: 18px;
            font-weight: 900;
        }

        .radar-wrap {
            display: flex;
            justify-content: center;
        }

        #radarCanvas {
            width: min(100%, 310px);
            aspect-ratio: 1;
        }

        .metric-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .metric-item {
            display: grid;
            grid-template-columns: 86px 1fr 44px;
            gap: 10px;
            align-items: center;
        }

        .metric-label,
        .metric-value {
            font-size: 13px;
            font-weight: 800;
            color: #666;
        }

        .metric-value {
            text-align: right;
        }

        .metric-track {
            height: 12px;
            border-radius: 999px;
            background: #ededed;
            overflow: hidden;
        }

        .metric-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #111 0%, #696969 100%);
        }

        .insight-text {
            margin: 0;
            font-size: 15px;
            line-height: 1.85;
            color: #424242;
            font-weight: 600;
        }

        .tips {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tips li {
            display: flex;
            gap: 10px;
            font-size: 15px;
            line-height: 1.75;
            color: #383838;
            font-weight: 600;
        }

        .tips li::before {
            content: "✦";
            color: #af9a59;
            font-weight: 900;
        }

        .share-box {
            margin-top: 12px;
            padding: 16px 18px;
            border-radius: 20px;
            background: #0b0b0b;
            color: #fff;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 18px;
        }

        .secondary-btn {
            background: #101010;
            color: #fff;
            font-size: 16px;
        }

        .ghost-btn {
            background: rgba(255, 255, 255, 0.95);
            color: #111;
            border: 1.5px solid #dbdbdb;
            font-size: 16px;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 26px;
            transform: translateX(-50%) translateY(10px);
            background: rgba(17, 17, 17, 0.94);
            color: #fff;
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 13px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
            z-index: 20;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 375px) {
            .sprite-marquee {
                gap: 10px;
            }

            .sprite {
                flex-basis: 84px;
                min-height: 88px;
            }

            .sprite-photo {
                width: 58px;
                height: 52px;
            }

            .option {
                padding: 18px 18px 18px 16px;
            }



            .option-text {
                font-size: 17px;
            }

            .action-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <section id="landingScreen" class="screen active hero">
            <div class="logo" aria-label="DOGTI 标题">
                <span>D</span><span>O</span><span>G</span><span>T</span><span>I</span>
            </div>

            <div class="sprite-wall" aria-hidden="true">
                <div id="heroDogRow1" class="sprite-marquee"></div>
                <div id="heroDogRow2" class="sprite-marquee reverse"></div>
            </div>



            <h1 class="hero-title"><span class="highlight">重生之我变成了一只狗</span></h1>
            <p class="hero-subtitle">“这一次，我要忠诚、热烈、理直气壮地活出自己的狗生。”</p>

            <div class="hero-meta">
                <div class="hero-chip">12 道情境题</div>
                <div class="hero-chip">16 种狗格结果</div>
                <div class="hero-chip">带雷达图和相处建议</div>
            </div>

            <button id="startBtn" class="primary-btn" type="button">
                <span class="btn-icon">▶</span>
                开始测试
            </button>

            <p class="bottom-note">来小红书找我玩 <a href="https://xhslink.com/m/9ijxa3lmbI8" target="_blank" rel="noopener noreferrer">@禾苏</a> · DogTI 已到位 🐶</p>



        </section>

        <section id="quizScreen" class="screen quiz-screen">
            <div class="topbar">
                <button id="backBtn" class="icon-btn" type="button" aria-label="返回上一题">←</button>
                <div id="progressCount" class="progress-count">1 / 12</div>
                <div></div>
            </div>
            <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>

            <div class="quiz-main">
                <div class="prompt-row">
                    <div id="promptAvatar" class="prompt-avatar">🐶</div>
                    <div class="prompt-bubble">
                        <div class="prompt-category"><span class="dot"></span><span id="promptCategory">社交还是不社交，这是个问题</span></div>
                        <div id="promptHint" class="prompt-hint">有些答案决定了你是主动贴贴，还是先躲起来观察局势。</div>
                    </div>
                </div>

                <h2 id="questionTitle" class="question-title">加载中...</h2>
                <div id="optionList" class="options"></div>
            </div>

            <div class="quiz-footer">
                <button id="nextBtn" class="primary-btn" type="button" disabled>
                    继续

        function startQuiz() {
            switchScreen("quiz");
            renderQuestion();
        }


        function restartQuiz() {
            state.index = 0;
            state.answers = Array(questions.length).fill(null);
            switchScreen("landing");
        }

        function switchScreen(target) {
            landingScreen.classList.toggle("active", target === "landing");
            quizScreen.classList.toggle("active", target === "quiz");
            resultScreen.classList.toggle("active", target === "result");
        }

        function renderQuestion() {
            const question = questions[state.index];
            const selected = state.answers[state.index];
            progressCount.textContent = `${state.index + 1} / ${questions.length}`;
            progressFill.style.width = `${((state.index + 1) / questions.length) * 100}%`;
            promptAvatar.textContent = question.avatar;
            promptCategory.textContent = question.category;
            promptHint.textContent = question.hint;
            questionTitle.textContent = question.text;
            optionList.innerHTML = "";

            question.options.forEach((option, optionIndex) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = `option${selected === optionIndex ? " active" : ""}`;
                button.innerHTML = `<div class="option-key">${String.fromCharCode(65 + optionIndex)}</div><div class="option-text">${option.text}</div>`;
                button.addEventListener("click", () => selectOption(optionIndex));
                optionList.appendChild(button);
            });

            nextBtn.disabled = selected === null;
            nextBtn.innerHTML = state.index === questions.length - 1 ? "查看结果 <span>→</span>" : "继续 <span>→</span>";
            backBtn.style.visibility = state.index === 0 ? "hidden" : "visible";
        }

        function selectOption(optionIndex) {
            state.answers[state.index] = optionIndex;
            [...optionList.children].forEach((node, idx) => {
                node.classList.toggle("active", idx === optionIndex);
            });
            nextBtn.disabled = false;
        }

        function goNext() {
            if (state.answers[state.index] === null) return;
            if (state.index < questions.length - 1) {
                state.index += 1;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: "smooth" });
            } else {
                renderResult();
                switchScreen("result");
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        }

        function goPrev() {
            if (state.index === 0) return;
            state.index -= 1;
            renderQuestion();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function computeResult() {
            const totals = {
                ei: 0,
                sn: 0,
                ft: 0,
                jp: 0,
                social: 0,
                curiosity: 0,
                affection: 0,
                order: 0,
                drama: 0
            };

            state.answers.forEach((answerIndex, questionIndex) => {
                const effect = questions[questionIndex].options[answerIndex].effect;
                Object.keys(effect).forEach((key) => {
                    totals[key] += effect[key];
                });
            });

            const code = [
                totals.ei >= 0 ? "E" : "I",
                totals.sn >= 0 ? "N" : "S",
                totals.ft >= 0 ? "F" : "T",
                totals.jp >= 0 ? "P" : "J"
            ].join("");

            const metrics = {
                social: clamp(Math.round(32 + totals.social * 7), 28, 98),
                curiosity: clamp(Math.round(30 + totals.curiosity * 7), 26, 99),
                affection: clamp(Math.round(30 + totals.affection * 7), 24, 99),
                order: clamp(Math.round(30 + totals.order * 7), 24, 99),
                drama: clamp(Math.round(28 + totals.drama * 7), 20, 99)
            };

            return {
                code,
                profile: profiles[code],
                metrics
            };
        }

        function renderResult() {
            const result = computeResult();
            const { code, profile, metrics } = result;
            document.getElementById("resultCode").textContent = code;
            document.getElementById("resultBreed").textContent = profile.breed;
            document.getElementById("resultRole").textContent = profile.role;
            document.getElementById("resultEmoji").textContent = profile.emoji;
            document.getElementById("resultSummary").textContent = profile.summary;
            document.getElementById("resultLove").textContent = profile.love;

            const tagsContainer = document.getElementById("resultTags");
            tagsContainer.innerHTML = profile.tags.map((tag) => `<span class="tag">${tag}</span>`).join("");

            const tipsContainer = document.getElementById("resultTips");
            tipsContainer.innerHTML = profile.tips.map((tip) => `<li>${tip}</li>`).join("");

            const metricEntries = [
                [metricLabels[0], metrics.social],
                [metricLabels[1], metrics.curiosity],
                [metricLabels[2], metrics.affection],
                [metricLabels[3], metrics.order],
                [metricLabels[4], metrics.drama]
            ];
            document.getElementById("metricList").innerHTML = metricEntries.map(([label, value]) => `
                <div class="metric-item">
                    <div class="metric-label">${label}</div>
                    <div class="metric-track"><div class="metric-fill" style="width:${value}%"></div></div>
                    <div class="metric-value">${value}</div>
                </div>
            `).join("");

            const shareText = `我测出来的 DogTI 是【${profile.breed}｜${profile.role}】\n代码：${code}\n标签：${profile.tags.join(" / ")}\n一句话总结：${profile.summary}`;
            document.getElementById("shareBox").textContent = shareText;
            shareBtn.dataset.shareText = shareText;

            drawRadar([metrics.social, metrics.curiosity, metrics.affection, metrics.order, metrics.drama], metricLabels);
        }

        function drawRadar(values, labels) {
            const canvas = document.getElementById("radarCanvas");
            const ctx = canvas.getContext("2d");
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2 + 6;
            const radius = 110;
            const levels = 4;

            ctx.clearRect(0, 0, width, height);
            ctx.save();
            ctx.translate(0.5, 0.5);

            for (let level = levels; level >= 1; level -= 1) {
                const currentRadius = (radius / levels) * level;
                ctx.beginPath();
                labels.forEach((_, index) => {
                    const angle = (-Math.PI / 2) + (Math.PI * 2 * index) / labels.length;
                    const x = centerX + Math.cos(angle) * currentRadius;
                    const y = centerY + Math.sin(angle) * currentRadius;
                    if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.closePath();
                ctx.fillStyle = level % 2 === 0 ? "rgba(0, 0, 0, 0.03)" : "rgba(0, 0, 0, 0.015)";
                ctx.strokeStyle = "rgba(0, 0, 0, 0.08)";
                ctx.lineWidth = 1;
                ctx.fill();
                ctx.stroke();
            }

            labels.forEach((label, index) => {
                const angle = (-Math.PI / 2) + (Math.PI * 2 * index) / labels.length;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = "rgba(0, 0, 0, 0.1)";
                ctx.stroke();

                const textX = centerX + Math.cos(angle) * (radius + 24);
                const textY = centerY + Math.sin(angle) * (radius + 24);
                ctx.fillStyle = "#666";
                ctx.font = "700 13px Microsoft YaHei";
                ctx.textAlign = textX < centerX - 6 ? "right" : textX > centerX + 6 ? "left" : "center";
                ctx.textBaseline = textY < centerY ? "bottom" : "top";
                ctx.fillText(label, textX, textY);
            });

            ctx.beginPath();
            values.forEach((value, index) => {
                const angle = (-Math.PI / 2) + (Math.PI * 2 * index) / values.length;
                const scaledRadius = (value / 100) * radius;
                const x = centerX + Math.cos(angle) * scaledRadius;
                const y = centerY + Math.sin(angle) * scaledRadius;
                if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fillStyle = "rgba(17, 17, 17, 0.18)";
            ctx.strokeStyle = "#111";
            ctx.lineWidth = 2.5;
            ctx.fill();
            ctx.stroke();

            values.forEach((value, index) => {
                const angle = (-Math.PI / 2) + (Math.PI * 2 * index) / values.length;
                const scaledRadius = (value / 100) * radius;
                const x = centerX + Math.cos(angle) * scaledRadius;
                const y = centerY + Math.sin(angle) * scaledRadius;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = "#111";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x, y, 2, 0, Math.PI * 2);
                ctx.fillStyle = "#f0db67";
                ctx.fill();
            });

            ctx.restore();
        }

        async function copyShareText() {
            const text = shareBtn.dataset.shareText || document.getElementById("shareBox").textContent;
            try {
                await navigator.clipboard.writeText(text);
                showToast("分享文案已复制，可以直接发给朋友");
            } catch (error) {
                showToast("复制失败，请手动长按复制");
            }
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add("show");
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => {
                toast.classList.remove("show");
            }, 1800);
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }
    </script>
</body>
