<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBTI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f1115;
      color: #f5f7fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .wrap {
      width: 100%;
      max-width: 760px;
      background: linear-gradient(180deg, #171a21 0%, #101319 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 40px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .eyebrow {
      color: #8ea1ff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 44px;
      line-height: 1;
    }
    p.desc {
      margin: 0 0 28px;
      color: #b8bfcc;
      font-size: 16px;
      line-height: 1.7;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 22px;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    a.card:hover {
      transform: translateY(-4px);
      border-color: rgba(142,161,255,0.45);
      background: rgba(142,161,255,0.08);
    }
    .emoji {
      font-size: 34px;
      margin-bottom: 12px;
    }
    .name {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .meta {
      color: #aab3c4;
      font-size: 14px;
      line-height: 1.6;
    }
    .footer {
      margin-top: 24px;
      color: #7f8796;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">NBTI PROJECTS</div>
    <h1>NBTI</h1>
    <p class="desc">把 CatTI 和 MouTI 收拢到同一个仓库后的统一入口。后续发布流程统一为：先提交到 GitHub，再由 Cloudflare Pages 拉取部署。</p>
    <section class="grid">
      <a class="card" href="./cat-ti/">
        <div class="emoji">🐱</div>
        <div class="name">CatTI</div>
        <div class="meta">猫咪性格测试页，单文件静态页面，适合作为独立子目录部署。</div>
      </a>
      <a class="card" href="./mou-ti/">
        <div class="emoji">🐮</div>
        <div class="name">MouTI</div>
        <div class="meta">牛牛性格测试页，沿用同一套单页发布方式，适合作为另一条 Pages 配置。</div>
      </a>
    </section>
    <div class="footer">建议两个 Cloudflare Pages 项目分别指向同一 GitHub 仓库下的 `cat-ti` 与 `mou-ti` 目录。</div>
  </main>
</body>
</html>
