name: Deploy DogTI to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "dog-ti/**"
      - ".github/workflows/deploy-dog-ti.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure DogTI project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4 pages project create dog-ti --production-branch main || echo "dog-ti project already exists"

      - name: Deploy DogTI
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: dog-ti
          directory: ./dog-ti
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
